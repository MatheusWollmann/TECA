
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teca</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'beige-light': '#F5F5DC',
              'blue-light': '#E0F2FE',
              'gold-subtle': '#D4AF37',
              'stone-calm': '#BFBDB7',
              'background-light': '#F8F7F4',
              'background-dark': '#1a202c',
              'text-light': '#333333',
              'text-dark': '#E2E8F0',
            },
            fontFamily: {
                sans: ['Inter', 'sans-serif'],
                serif: ['Cormorant Garamond', 'Georgia', 'serif'],
            },
          }
        }
      }
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      html { scroll-behavior: smooth; }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(32px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(var(--r, 12deg)); }
        50%      { transform: translateY(-18px) rotate(var(--r, 12deg)); }
      }
      @keyframes float-slow {
        0%, 100% { transform: translateY(0) rotate(var(--r, -8deg)); }
        50%      { transform: translateY(-10px) rotate(var(--r, -8deg)); }
      }
      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(212,175,55,0.15); }
        50%      { box-shadow: 0 0 40px rgba(212,175,55,0.3); }
      }
      @keyframes gradient-shift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes scroll-hint {
        0%, 100% { opacity: 1; transform: translateY(0); }
        50%      { opacity: 0.4; transform: translateY(8px); }
      }
      @keyframes stagger-in {
        from { opacity: 0; transform: translateY(40px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      .animate-fade-up   { animation: fade-up 0.8s cubic-bezier(0.16,1,0.3,1) both; }
      .animate-fade-in   { animation: fade-in 1s ease both; }
      .animate-float     { animation: float 6s ease-in-out infinite; }
      .animate-float-slow{ animation: float-slow 8s ease-in-out infinite; }
      .animate-marquee   { animation: marquee 30s linear infinite; }
      .animate-pulse-glow{ animation: pulse-glow 3s ease-in-out infinite; }
      .animate-gradient  { animation: gradient-shift 8s ease infinite; background-size: 200% 200%; }
      .animate-scroll-hint { animation: scroll-hint 2s ease-in-out infinite; }
      .animate-stagger   { animation: stagger-in 0.7s cubic-bezier(0.16,1,0.3,1) both; }

      .delay-100 { animation-delay: 0.1s; }
      .delay-200 { animation-delay: 0.2s; }
      .delay-300 { animation-delay: 0.3s; }
      .delay-400 { animation-delay: 0.4s; }
      .delay-500 { animation-delay: 0.5s; }
      .delay-700 { animation-delay: 0.7s; }

      .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
      .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
      .line-clamp-4 { display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }

      .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
      .glass-light { background: rgba(255,255,255,0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

      .text-gradient {
        background: linear-gradient(135deg, #D4AF37 0%, #f0d060 50%, #D4AF37 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0"
  }
}
</script>
</head>
<body class="bg-background-light dark:bg-background-dark antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
